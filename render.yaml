services:
  - type: web
    name: degenspace-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PAPERDEX_URL
        sync: false
